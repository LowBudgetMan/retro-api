services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: retroapi
      POSTGRES_DB: retroapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-server:
    image: quay.io/keycloak/keycloak:26.6.0
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: 'admin'
      KC_BOOTSTRAP_ADMIN_PASSWORD: 'admin'
      KC_HOSTNAME: "http://localhost:${KEYCLOAK_PORT:-8010}"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "${KEYCLOAK_PORT:-8010}:8080"
    volumes:
      - ./keycloak-realm-data:/opt/keycloak/data/import
    command: start-dev --import-realm

  rabbitmq:
    build:
      context: ./
      dockerfile: RabbitMqDockerfile
    ports:
      - '5672:5672'
      - '15672:15672'
      - '61613:61613'
      - '1883:1883'
      - '15692:15692'
      - '25672:25672'

  api:
    image: ${RETRO_API_IMAGE:-ghcr.io/lowbudgetman/retro-api:latest}
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - db
      - auth-server
      - rabbitmq

volumes:
  postgres_data:
